<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" th:href="@{/Login.css}"></head>
<body>
<div class="login-container">
    <form action="/login/handleLogin" method="POST">
        <h2>Login</h2>
        <div class="input-group">
            <label for="email">Email</label>
            <input type="text" id="email" name="email" required placeholder="Enter Email">
        </div>
        <div class="input-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required placeholder="Enter Password">
        </div>
        <button type="submit" class="login-btn">Login</button>
        <p class="footer-text">Forgot password? <a href="#">Click here</a></p>
    </form>
</div>
</body>
</html>
