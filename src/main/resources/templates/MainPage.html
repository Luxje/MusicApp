<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Binh.Cloud</title>
    <link rel="stylesheet" th:href="@{/mainPage.css}">
    <link rel="stylesheet" th:href="@{/main-footer.css}">
    <link rel="stylesheet" th:href="@{/player-theme.css}">
</head>
<body>
<div class="container">
    <header>
        <div class="logo">Binh. Cloud</div>
        <nav>
            <a href="/Music/Home">Home</a>
            <a href="Feed.html">Feed</a>
            <a href="Libary.html">Library</a>
        </nav>
        <form class="search-bar" th:action="@{/mainController/search}" method="get">
            <input type="text" placeholder="Search" name="searchInput" id="searchInput">
            <button href="/mainController/search" type="submit">Search</button>
        </form>
        <a href="#" class="pro-link">Nhac cua Binh</a>
        <nav><a href="Login.html">Login</a></nav>
    </header>

    <main>
        <div class="content">
            <h2>Made for you</h2>
            <div class="stations1">
                <a th:each="track : ${trackList}"
                   href="javascript:void(0);"
                   class="station"
                   th:data-id="${track.trackId}"
                   th:data-title="${track.title}"
                   onclick="playFromData(this)">
                    <img th:src="@{'/my-images/' + ${track.imagePath}}" alt="Track Cover">
                    <span th:text="${track.title}"></span>
                </a>
            </div>

            <h2 style="margin-top: 40px;">Discover with Stations</h2>
            <div class="stations2">
            </div>
        </div>

        <audio id="audio-player"></audio>

        <div class="card">
            <div class="top">
                <div class="pfp">
                    <div class="playing">
                        <div class="greenline line-1"></div>
                        <div class="greenline line-2"></div>
                        <div class="greenline line-3"></div>
                        <div class="greenline line-4"></div>
                        <div class="greenline line-5"></div>
                    </div>
                </div>
                <div class="texts">
                    <p class="title-1">Soldiers Rage</p>
                    <p class="title-2">Tha Mechanic</p>
                </div>
            </div>

            <div class="player-center">
                <div class="controls">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="24" width="24"><path d="M12 21.6a9.6 9.6 0 1 0 0-19.2 9.6 9.6 0 0 0 0 19.2Zm.848-12.352a1.2 1.2 0 0 0-1.696-1.696l-3.6 3.6a1.2 1.2 0 0 0 0 1.696l3.6 3.6a1.2 1.2 0 0 0 1.696-1.696L11.297 13.2H15.6a1.2 1.2 0 1 0 0-2.4h-4.303l1.551-1.552Z"/></svg>

                    <svg id="play-btn" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <path id="play-icon" d="M21.6 12a9.6 9.6 0 1 1-19.2 0 9.6 9.6 0 0 1 19.2 0ZM8.4 9.6a1.2 1.2 0 1 1 2.4 0v4.8a1.2 1.2 0 1 1-2.4 0V9.6Zm6-1.2a1.2 1.2 0 0 0-1.2 1.2v4.8a1.2 1.2 0 1 0 2.4 0V9.6a1.2 1.2 0 0 0-1.2-1.2Z"/>
                    </svg>

                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="24" width="24"><path d="M12 21.6a9.6 9.6 0 1 0 0-19.2 9.6 9.6 0 0 0 0 19.2Zm4.448-10.448-3.6-3.6a1.2 1.2 0 0 0-1.696 1.696l1.551 1.552H8.4a1.2 1.2 0 1 0 0 2.4h4.303l-1.551 1.552a1.2 1.2 0 1 0 1.696 1.696l3.6-3.6a1.2 1.2 0 0 0 0-1.696Z"/></svg>
                </div>

                <div class="progress-wrapper">
                    <p class="timetext time_now" id="current-time">0:00</p>
                    <div class="time" id="progress-container">
                        <div class="elapsed" id="progress-bar" style="width: 0%;"></div>
                    </div>
                    <p class="timetext time_full" id="total-duration">0:00</p>
                </div>
            </div>

            <div class="player-right">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" stroke="currentColor" fill="none" height="20" width="24"><path d="M3.343 7.778a4.5 4.5 0 0 1 7.339-1.46L12 7.636l1.318-1.318a4.5 4.5 0 1 1 6.364 6.364L12 20.364l-7.682-7.682a4.501 4.501 0 0 1-.975-4.904Z"/></svg>

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="20" width="24" class="volume_button"><path d="M11.26 3.691A1.2 1.2 0 0 1 12 4.8v14.4a1.199 1.199 0 0 1-2.048.848L5.503 15.6H2.4a1.2 1.2 0 0 1-1.2-1.2V9.6a1.2 1.2 0 0 1 1.2-1.2h3.103l4.449-4.448a1.2 1.2 0 0 1 1.308-.26Zm6.328-.176a1.2 1.2 0 0 1 1.697 0A11.967 11.967 0 0 1 22.8 12a11.966 11.966 0 0 1-3.515 8.485 1.2 1.2 0 0 1-1.697-1.697A9.563 9.563 0 0 0 20.4 12a9.565 9.565 0 0 0-2.812-6.788 1.2 1.2 0 0 1 0-1.697Zm-3.394 3.393a1.2 1.2 0 0 1 1.698 0A7.178 7.178 0 0 1 18 12a7.18 7.18 0 0 1-2.108 5.092 1.2 1.2 0 1 1-1.698-1.698A4.782 4.782 0 0 0 15.6 12a4.78 4.78 0 0 0-1.406-3.394 1.2 1.2 0 0 1 0-1.698Z"/></svg>

                <div class="volume">
                    <div class="slider"></div>
                </div>
            </div>
        </div>
    </main>
</div>

<script th:src="@{/js/player.js}"></script>
<script th:src="@{/js/music-player.js}"></script>
</body>
</html>
