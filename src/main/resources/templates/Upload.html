<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload</title>
</head>
<body>
<form th:action="@{/Music/upload}" method="post" enctype="multipart/form-data">
    <span th:text="${message}"></span>
    <label>Put your track in, Only mp3 file</label>
    <input type="file" name="file">
    <label>Give your new track a name: </label>
    <input type="text" name="trackTitle">
    <button type="submit">Aducheck</button>
</form>
</body>
</html>
